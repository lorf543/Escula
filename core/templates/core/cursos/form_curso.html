<div class="modal-header">
    <h5 class="modal-title"><i class="bi bi-collection me-2"></i>{{ title }}</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<form hx-post="{% url 'core:curso_create' %}"
      hx-target="#formModalContent"
      hx-swap="innerHTML">
    {% csrf_token %}
    <div class="modal-body">
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}<div class="form-text text-muted">{{ field.help_text }}</div>{% endif %}
            {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-ghost" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-accent"><i class="bi bi-check-lg me-1"></i>Guardar</button>
    </div>
</form>
