<div class="table-dark-custom">
    <table class="table table-dark">
        <thead>
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Profesores</th>
                <th class="text-end">Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for materia in materias %}
            <tr>
                <td><span class="badge bg-secondary">{{ materia.codigo }}</span></td>
                <td class="fw-semibold">{{ materia.nombre }}</td>
                <td class="text-muted">{{ materia.descripcion|truncatewords:8|default:"—" }}</td>
                <td>{{ materia.profesores.count }}</td>
                <td class="text-end">
                    <button type="button"
                            class="btn btn-sm btn-ghost"
                            hx-get="{% url 'core:materia_update' materia.pk %}"
                            hx-target="#formModalContent"
                            hx-swap="innerHTML">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button type="button"
                            class="btn btn-sm btn-ghost text-danger"
                            hx-get="{% url 'core:materia_delete' materia.pk %}"
                            hx-target="#formModalContent"
                            hx-swap="innerHTML">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">
                    <div class="empty-state">
                        <i class="bi bi-book d-block"></i>
                        <p>No hay materias registradas</p>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
