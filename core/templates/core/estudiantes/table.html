<div class="table-dark-custom">
    <table class="table table-dark">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Grado</th>
                <th>Sección</th>
                <th>Cédula</th>
                <th>Profesores</th>
                <th class="text-end">Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for est in estudiantes %}
            <tr>
                <td>
                    <a href="{% url 'core:estudiante_detail' est.pk %}" class="text-decoration-none text-light fw-semibold">
                        {{ est.nombre_completo }}
                    </a>
                </td>
                <td><span class="badge bg-secondary">{{ est.grado }}</span></td>
                <td>{{ est.seccion }}</td>
                <td>{{ est.cedula|default:"—" }}</td>
                <td>{{ est.profesores.count }}</td>
                <td class="text-end">
                    <a href="{% url 'core:estudiante_detail' est.pk %}" class="btn btn-sm btn-ghost">
                        <i class="bi bi-eye"></i>
                    </a>
                    <button type="button"
                            class="btn btn-sm btn-ghost"
                            hx-get="{% url 'core:estudiante_update' est.pk %}"
                            hx-target="#formModalContent"
                            hx-swap="innerHTML">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button type="button"
                            class="btn btn-sm btn-ghost text-danger"
                            hx-get="{% url 'core:estudiante_delete' est.pk %}"
                            hx-target="#formModalContent"
                            hx-swap="innerHTML">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="6">
                    <div class="empty-state">
                        <i class="bi bi-people d-block"></i>
                        <p>No hay estudiantes registrados</p>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
