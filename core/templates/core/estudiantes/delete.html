<div class="modal-header">
    <h5 class="modal-title text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Eliminar Estudiante</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<form hx-post="{% url 'core:estudiante_delete' object.pk %}" hx-target="#formModalContent">
    {% csrf_token %}
    <div class="modal-body">
        <p>¿Estás seguro de que deseas eliminar al estudiante <strong>{{ object.nombre_completo }}</strong>?</p>
        <p class="text-muted small">Se eliminarán también todas sus observaciones y registros de asistencia.</p>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-ghost" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i>Eliminar
        </button>
    </div>
</form>
