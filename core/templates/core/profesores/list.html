{% extends "base.html" %}
{% block title %}Profesores{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="bi bi-person-badge-fill me-2"></i>Profesores</h1>
    <button class="btn btn-accent"
            hx-get="{% url 'core:profesor_create' %}"
            hx-target="#formModalContent">
        <i class="bi bi-plus-lg me-1"></i>Nuevo Profesor
    </button>
</div>

<div class="mb-3">
    <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text"
               name="q"
               placeholder="Buscar profesores..."
               value="{{ q }}"
               hx-get="{% url 'core:profesor_list' %}"
               hx-trigger="keyup changed delay:300ms"
               hx-target="#profesores-table">
    </div>
</div>

<div id="profesores-table"
     hx-get="{% url 'core:profesor_list' %}"
     hx-trigger="profesorChanged from:body"
     hx-target="this">
    {% include "core/profesores/table.html" %}
</div>
{% endblock %}
