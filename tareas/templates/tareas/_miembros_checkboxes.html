{% if estudiantes %}
<div class="d-flex flex-column gap-1 p-2 rounded miembros-checkboxes" style="max-height:280px;overflow-y:auto;background:var(--surface-3);border:1px solid var(--border)">
    {% for est in estudiantes %}
    <div class="form-check">
        <input class="form-check-input" type="checkbox" name="{{ field_prefix }}-miembros" value="{{ est.pk }}" id="{{ field_prefix }}_miembro_{{ est.pk }}"
               {% if est.pk in selected %}checked{% endif %}>
        <label class="form-check-label" for="{{ field_prefix }}_miembro_{{ est.pk }}">
            {{ est.apellido }}, {{ est.nombre }}
            <span class="text-muted small">({{ est.get_grado_display }} {{ est.seccion }})</span>
        </label>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-muted small mb-0">Seleccione al menos un curso para ver los estudiantes disponibles.</p>
{% endif %}
